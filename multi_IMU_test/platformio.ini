; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_port = COM6
upload_port = COM6

; Prevent auto-reset issues (important for ESP32-S3 USB)
monitor_dtr = 0
monitor_rts = 0

; Clean raw CSV output (no extra formatting)
monitor_filters = direct

; Enable native USB serial on ESP32-S3
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Note: WiFi.h and WebServer.h are framework built-ins (arduino-esp32)
; and do not need to be listed under lib_deps.
lib_deps =
    adafruit/Adafruit LSM6DS@^4.7.0
    adafruit/Adafruit Unified Sensor@^1.1.15
