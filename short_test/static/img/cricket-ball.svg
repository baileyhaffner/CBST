<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="leather" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e35858"/>
      <stop offset="60%" stop-color="#d04848"/>
      <stop offset="100%" stop-color="#7a2222"/>
    </radialGradient>
  </defs>

  <circle cx="32" cy="32" r="26" fill="url(#leather)" stroke="#3a0d0d" stroke-width="0.6"/>

  <!-- specular highlight -->
  <ellipse cx="22" cy="22" rx="9" ry="5" fill="rgba(255,255,255,0.18)" transform="rotate(-30 22 22)"/>

  <!-- seam (equator curve) -->
