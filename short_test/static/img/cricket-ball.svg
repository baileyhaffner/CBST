  <path d="M 9 31 Q 32 39 55 31" fill="none" stroke="#f4e6c8" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>

  <!-- stitches along the visible seam -->
  <g stroke="#f4e6c8" stroke-width="0.9" stroke-linecap="round">
    <line x1="13" y1="29.6" x2="13" y2="31.4"/>
    <line x1="18" y1="28.2" x2="18" y2="30.6"/>
    <line x1="23" y1="27.2" x2="23" y2="30.0"/>
    <line x1="28" y1="26.6" x2="28" y2="29.6"/>
    <line x1="33" y1="26.6" x2="33" y2="29.6"/>
    <line x1="38" y1="27.0" x2="38" y2="29.8"/>
    <line x1="43" y1="27.6" x2="43" y2="30.2"/>
    <line x1="48" y1="28.6" x2="48" y2="30.8"/>
    <line x1="53" y1="30.0" x2="53" y2="31.6"/>
  </g>
</svg>
