; ============================================================
;  PlatformIO Project Configuration
;  Board: Unexpected Maker ProS3 (ESP32-S3)
;  Test: WiFi connectivity via Serial Monitor
; ============================================================

[env:pros3]
platform              = espressif32
board                 = um_pros3
framework             = arduino

; Serial monitor settings
monitor_speed         = 115200
monitor_filters       = esp32_exception_decoder, colorize

; Upload speed
upload_speed          = 921600

; Partition scheme with enough app space
board_build.partitions = default.csv

; Required libraries
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3        ; Verbose ESP-IDF logs to serial (0=none, 5=max)
    -DBOARD_HAS_PSRAM           ; ProS3 has 8MB PSRAM
    -mfix-esp32-psram-cache-issue